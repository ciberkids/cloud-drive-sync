name: Sync Wiki

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync wiki content
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Configure git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Clone the wiki repo using HTTPS with token auth
          wiki_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.wiki.git"

          if ! git clone "$wiki_url" wiki-repo 2>/dev/null; then
            echo "::warning::Wiki not initialized yet. Please create the first wiki page via the GitHub web UI, then re-run this workflow."
            echo "Go to: https://github.com/${{ github.repository }}/wiki → Create the first page"
            exit 0
          fi

          # Generate wiki pages from docs/ (single source of truth)
          # Map docs filenames to wiki page names
          cp docs/ARCHITECTURE.md  wiki-repo/Architecture.md
          cp docs/API.md           wiki-repo/API-Reference.md
          cp docs/CONTRIBUTING.md  wiki-repo/Contributing.md
          cp docs/CLI.md           wiki-repo/CLI.md
          cp docs/DAEMON.md        wiki-repo/Daemon.md
          cp docs/UI.md            wiki-repo/UI.md

          # Generate Home page from README (strip first line header, adjust links)
          sed 's|\(docs/screenshots/\)|https://raw.githubusercontent.com/${{ github.repository }}/main/\1|g' README.md > wiki-repo/Home.md

          # Generate sidebar navigation
          cat > wiki-repo/_Sidebar.md << 'SIDEBAR'
          **Cloud Drive Sync**

          - [[Home]]
          - [[Architecture]]
          - [[API Reference|API-Reference]]
          - [[CLI]]
          - [[Daemon]]
          - [[UI]]
          - [[Contributing]]
          SIDEBAR

          # Generate footer
          cat > wiki-repo/_Footer.md << 'FOOTER'
          [Cloud Drive Sync](https://github.com/${{ github.repository }}) | [Report an Issue](https://github.com/${{ github.repository }}/issues) | [Releases](https://github.com/${{ github.repository }}/releases)
          FOOTER

          # Commit and push if there are changes
          cd wiki-repo
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes to push"
          else
            git commit -m "Sync wiki from docs/ (auto-generated)"
            git push origin HEAD:master || git push origin HEAD:main
          fi
