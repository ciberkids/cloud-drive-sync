name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-daemon:
    name: Build Daemon Binary
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller and dependencies
        run: |
          pip install pyinstaller
          pip install ./daemon

      - name: Build daemon binary
        run: |
          cd daemon
          pyinstaller \
            --onefile \
            --name cloud-drive-sync-daemon \
            --hidden-import=cloud_drive_sync \
            --hidden-import=google.auth.transport.requests \
            --hidden-import=google.auth.transport._http_client \
            --collect-all=googleapiclient \
            src/cloud_drive_sync/__main__.py

      - name: Upload daemon artifact
        uses: actions/upload-artifact@v4
        with:
          name: daemon-binary
          path: daemon/dist/cloud-drive-sync-daemon

  build-ui:
    name: Build Tauri UI (with bundled daemon)
    needs: build-daemon
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            rpm

      - name: Download daemon binary
        uses: actions/download-artifact@v4
        with:
          name: daemon-binary
          path: ui/src-tauri/bin

      - name: Place daemon as sidecar with target triple
        run: |
          mv ui/src-tauri/bin/cloud-drive-sync-daemon \
             ui/src-tauri/bin/cloud-drive-sync-daemon-x86_64-unknown-linux-gnu
          chmod +x ui/src-tauri/bin/cloud-drive-sync-daemon-x86_64-unknown-linux-gnu

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: Build Tauri app
        working-directory: ui
        run: npx tauri build

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-deb
          path: ui/src-tauri/target/release/bundle/deb/*.deb

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-appimage
          path: ui/src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-rpm
          path: ui/src-tauri/target/release/bundle/rpm/*.rpm

  release:
    name: Create GitHub Release
    needs: [build-daemon, build-ui]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          cp release-artifacts/daemon-binary/cloud-drive-sync-daemon release/
          cp release-artifacts/ui-deb/*.deb release/
          cp release-artifacts/ui-appimage/*.AppImage release/
          cp release-artifacts/ui-rpm/*.rpm release/
          chmod +x release/cloud-drive-sync-daemon
          chmod +x release/*.AppImage
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*
            install.sh
            installer/cloud-drive-sync-daemon.service
