name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-daemon:
    name: Build Daemon Binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: daemon-linux
            ext: ""
          - os: windows-latest
            artifact: daemon-windows
            ext: ".exe"
          - os: macos-latest
            artifact: daemon-macos
            ext: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller and dependencies
        run: |
          pip install pyinstaller
          pip install ./daemon

      - name: Build daemon binary
        working-directory: daemon
        run: pyinstaller --onefile --name cloud-drive-sync-daemon --hidden-import=cloud_drive_sync --hidden-import=google.auth.transport.requests --hidden-import=google.auth.transport._http_client --collect-all=googleapiclient src/cloud_drive_sync/__main__.py

      - name: Upload daemon artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: daemon/dist/cloud-drive-sync-daemon${{ matrix.ext }}

  build-ui:
    name: Build Tauri UI (${{ matrix.os }})
    needs: build-daemon
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            daemon_artifact: daemon-linux
            triple: x86_64-unknown-linux-gnu
            ext: ""
          - os: windows-latest
            daemon_artifact: daemon-windows
            triple: x86_64-pc-windows-msvc
            ext: ".exe"
          - os: macos-latest
            daemon_artifact: daemon-macos
            triple: x86_64-apple-darwin
            ext: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            rpm

      - name: Download daemon binary
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.daemon_artifact }}
          path: ui/src-tauri/bin

      - name: Place daemon as sidecar with target triple (Unix)
        if: runner.os != 'Windows'
        run: |
          mv ui/src-tauri/bin/cloud-drive-sync-daemon \
             ui/src-tauri/bin/cloud-drive-sync-daemon-${{ matrix.triple }}
          chmod +x ui/src-tauri/bin/cloud-drive-sync-daemon-${{ matrix.triple }}

      - name: Place daemon as sidecar with target triple (Windows)
        if: runner.os == 'Windows'
        run: |
          Move-Item "ui/src-tauri/bin/cloud-drive-sync-daemon.exe" `
            "ui/src-tauri/bin/cloud-drive-sync-daemon-${{ matrix.triple }}.exe"
        shell: pwsh

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: Build Tauri app
        working-directory: ui
        run: npx tauri build

      - name: Upload Linux deb artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ui-linux-deb
          path: ui/src-tauri/target/release/bundle/deb/*.deb

      - name: Upload Linux AppImage artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ui-linux-appimage
          path: ui/src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload Linux RPM artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ui-linux-rpm
          path: ui/src-tauri/target/release/bundle/rpm/*.rpm

      - name: Upload Windows MSI artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ui-windows-msi
          path: ui/src-tauri/target/release/bundle/msi/*.msi

      - name: Upload Windows NSIS artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ui-windows-nsis
          path: ui/src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload macOS DMG artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ui-macos-dmg
          path: ui/src-tauri/target/release/bundle/dmg/*.dmg

  build-flatpak:
    name: Build Flatpak
    needs: build-ui
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download daemon binary
        uses: actions/download-artifact@v4
        with:
          name: daemon-linux
          path: flatpak

      - name: Extract UI binary from deb
        uses: actions/download-artifact@v4
        with:
          name: ui-linux-deb
          path: /tmp/deb-pkg

      - name: Prepare Flatpak build sources
        run: |
          # Extract the UI binary and sidecar from the deb package
          mkdir -p /tmp/deb-extracted
          cd /tmp/deb-pkg
          ar x *.deb
          tar xf data.tar.* -C /tmp/deb-extracted
          cp /tmp/deb-extracted/usr/bin/cloud-drive-sync-ui $GITHUB_WORKSPACE/flatpak/
          chmod +x $GITHUB_WORKSPACE/flatpak/cloud-drive-sync-ui
          chmod +x $GITHUB_WORKSPACE/flatpak/cloud-drive-sync-daemon

          # Prepare desktop entry with Flatpak app ID
          sed 's/^Icon=cloud-drive-sync$/Icon=com.cloud_drive_sync.app/' \
            $GITHUB_WORKSPACE/installer/cloud-drive-sync.desktop > $GITHUB_WORKSPACE/flatpak/cloud-drive-sync.desktop

          # Copy icon
          cp $GITHUB_WORKSPACE/installer/icons/gdrive-sync.svg $GITHUB_WORKSPACE/flatpak/cloud-drive-sync.svg

          # Bundle appindicator shared libs for system tray support
          sudo apt-get update
          sudo apt-get install -y libayatana-appindicator3-1
          mkdir -p $GITHUB_WORKSPACE/flatpak/appindicator-libs
          cp -a /usr/lib/x86_64-linux-gnu/libayatana-appindicator3.so* $GITHUB_WORKSPACE/flatpak/appindicator-libs/
          cp -a /usr/lib/x86_64-linux-gnu/libayatana-indicator3.so* $GITHUB_WORKSPACE/flatpak/appindicator-libs/ 2>/dev/null || true
          cp -a /usr/lib/x86_64-linux-gnu/libdbusmenu-gtk3.so* $GITHUB_WORKSPACE/flatpak/appindicator-libs/ 2>/dev/null || true
          cp -a /usr/lib/x86_64-linux-gnu/libdbusmenu-glib.so* $GITHUB_WORKSPACE/flatpak/appindicator-libs/ 2>/dev/null || true

          ls -lh $GITHUB_WORKSPACE/flatpak/

      - name: Install Flatpak and flatpak-builder
        run: |
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.gnome.Platform//46 org.gnome.Sdk//46

      - name: Build Flatpak bundle
        run: |
          cd flatpak
          flatpak-builder --user --force-clean --repo=repo build com.cloud_drive_sync.app.yml
          flatpak build-bundle repo cloud-drive-sync.flatpak com.cloud_drive_sync.app

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-flatpak
          path: flatpak/cloud-drive-sync.flatpak

  release:
    name: Create GitHub Release
    needs: [build-daemon, build-ui, build-flatpak]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release files
        run: |
          mkdir -p release

          # Linux daemon
          cp release-artifacts/daemon-linux/cloud-drive-sync-daemon release/cloud-drive-sync-daemon-linux
          chmod +x release/cloud-drive-sync-daemon-linux

          # Windows daemon
          cp release-artifacts/daemon-windows/cloud-drive-sync-daemon.exe release/cloud-drive-sync-daemon-windows.exe

          # macOS daemon
          cp release-artifacts/daemon-macos/cloud-drive-sync-daemon release/cloud-drive-sync-daemon-macos
          chmod +x release/cloud-drive-sync-daemon-macos

          # Linux UI packages
          cp release-artifacts/ui-linux-deb/*.deb release/
          cp release-artifacts/ui-linux-appimage/*.AppImage release/
          cp release-artifacts/ui-linux-rpm/*.rpm release/
          cp release-artifacts/ui-flatpak/*.flatpak release/
          chmod +x release/*.AppImage

          # Windows UI packages
          cp release-artifacts/ui-windows-msi/*.msi release/ 2>/dev/null || true
          cp release-artifacts/ui-windows-nsis/*.exe release/ 2>/dev/null || true

          # macOS UI packages
          cp release-artifacts/ui-macos-dmg/*.dmg release/ 2>/dev/null || true

          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*
            install.sh
            installer/cloud-drive-sync-daemon.service
