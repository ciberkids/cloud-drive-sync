name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  daemon-lint-test:
    name: Daemon – Lint & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        working-directory: daemon

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (Unix)
        if: runner.os != 'Windows'
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -e ".[dev]"

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m venv .venv
          .venv\Scripts\pip install -e ".[dev]"

      - name: Lint (Unix)
        if: runner.os != 'Windows'
        run: .venv/bin/ruff check src/ tests/

      - name: Lint (Windows)
        if: runner.os == 'Windows'
        run: .venv\Scripts\ruff check src/ tests/

      - name: Test (Unix)
        if: runner.os != 'Windows'
        run: .venv/bin/pytest -v --cov=cloud_drive_sync --cov-report=xml

      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: .venv\Scripts\pytest -v --tb=long --cov=cloud_drive_sync --cov-report=xml 2>&1 | tee test-output.txt

      - name: Upload test output on failure (Windows)
        if: runner.os == 'Windows' && failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-test-output
          path: daemon/test-output.txt

  ui-typecheck:
    name: UI – Type Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    defaults:
      run:
        working-directory: ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies for Tauri
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Install npm dependencies
        run: npm install

      - name: Type check
        run: npx tsc --noEmit

  cargo-check:
    name: Tauri – Cargo Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            triple: x86_64-unknown-linux-gnu
            install_deps: true
          - os: windows-latest
            triple: x86_64-pc-windows-msvc
            install_deps: false
          - os: macos-latest
            triple: aarch64-apple-darwin
            install_deps: false
    defaults:
      run:
        working-directory: ui/src-tauri

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies for Tauri
        if: matrix.install_deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Create sidecar placeholder (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p bin
          touch bin/cloud-drive-sync-daemon-${{ matrix.triple }}
          chmod +x bin/cloud-drive-sync-daemon-${{ matrix.triple }}

      - name: Create sidecar placeholder (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Path "bin" -Force | Out-Null
          New-Item -ItemType File -Path "bin/cloud-drive-sync-daemon-${{ matrix.triple }}.exe" -Force | Out-Null
        shell: pwsh

      - name: Cargo check
        run: cargo check --all-targets
