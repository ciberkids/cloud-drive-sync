<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4285F4"/>
      <stop offset="100%" style="stop-color:#34A853"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Cloud shape -->
  <g transform="translate(256,230)" fill="white">
    <ellipse cx="0" cy="0" rx="120" ry="80"/>
    <ellipse cx="-70" cy="20" rx="70" ry="60"/>
    <ellipse cx="70" cy="20" rx="70" ry="60"/>
    <rect x="-120" y="0" width="240" height="60" fill="white"/>
  </g>
  <!-- Sync arrows -->
  <g transform="translate(256,310)" fill="white" opacity="0.95">
    <!-- Up arrow -->
    <polygon points="-30,-15 -10,-15 -10,-40 10,-40 -20,-60 -50,-40 -30,-40"/>
    <!-- Down arrow -->
    <polygon points="30,15 10,15 10,40 -10,40 20,60 50,40 30,40"/>
  </g>
</svg>
