<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Tray icon: error state - red X cloud -->
  <g transform="translate(32,26)">
    <!-- Cloud -->
    <ellipse cx="0" cy="0" rx="22" ry="15" fill="#4285F4"/>
    <ellipse cx="-13" cy="4" rx="13" ry="11" fill="#4285F4"/>
    <ellipse cx="13" cy="4" rx="13" ry="11" fill="#4285F4"/>
    <rect x="-22" y="0" width="44" height="11" fill="#4285F4"/>
  </g>
  <!-- Red error circle -->
  <circle cx="44" cy="44" r="12" fill="#EA4335"/>
  <!-- X mark -->
  <g transform="translate(44,44)" stroke="white" stroke-width="2.5" stroke-linecap="round">
    <line x1="-4" y1="-4" x2="4" y2="4"/>
    <line x1="4" y1="-4" x2="-4" y2="4"/>
  </g>
</svg>
