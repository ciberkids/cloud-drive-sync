    <!-- Cloud -->
    <ellipse cx="0" cy="0" rx="22" ry="15" fill="#4285F4"/>
    <ellipse cx="-13" cy="4" rx="13" ry="11" fill="#4285F4"/>
    <ellipse cx="13" cy="4" rx="13" ry="11" fill="#4285F4"/>
    <rect x="-22" y="0" width="44" height="11" fill="#4285F4"/>
  </g>
  <!-- Orange warning circle -->
  <circle cx="44" cy="44" r="12" fill="#FBBC04"/>
  <!-- Exclamation mark -->
  <g transform="translate(44,44)" fill="#333">
    <rect x="-1.5" y="-7" width="3" height="9" rx="1.5"/>
    <circle cx="0" cy="6" r="2"/>
  </g>
</svg>
